name: Python Release Build

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'نام تگ (مثلاً v1.0.0) - در صورت خالی بودن، از تگ push استفاده می‌شود'
        required: false
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: read

env:
  # برای رفع هشدار Node 20 (اختیاری)
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x86'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt5 Pillow pyinstaller

      - name: Download icon file
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/Afsanehi-az-Nabardhaye-Bozorg/View-bmfont-.fnt-file/main/Image/View-bmfont-.fnt-file-icon.ico" -OutFile "app_icon.ico"
          if (Test-Path "app_icon.ico") {
            Write-Host "Icon downloaded successfully"
          } else {
            Write-Host "Icon download failed, continuing without icon"
          }

      - name: Build executable with PyInstaller
        run: |
          if (Test-Path "app_icon.ico") {
            pyinstaller --onefile --windowed --name "ViewBmfontFnt" --icon "app_icon.ico" --add-data "*.py;." main.py
          } else {
            pyinstaller --onefile --windowed --name "ViewBmfontFnt" --add-data "*.py;." main.py
          }

      - name: Get tag name
        id: get_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "tag_name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.inputs.tag_name }}" != "" ]; then
            echo "tag_name=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag_name=latest" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ViewBmfontFnt.exe
          tag_name: ${{ steps.get_tag.outputs.tag_name }}
          name: Release ${{ steps.get_tag.outputs.tag_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
