name: Python Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x86'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt5 Pillow

      - name: Build executable with PyInstaller
        run: |
          pip install pyinstaller
          pyinstaller --onefile --windowed --name "BMFontViewer" main.py

      - name: Prepare release files
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "release" | Out-Null
          Copy-Item "dist/BMFontViewer.exe" "release/" -Force
          # اگر فایل README یا مستندات دارید، کپی کنید
          # Copy-Item "README.md" "release/" -Force

      - name: Create ZIP package
        shell: powershell
        run: |
          Compress-Archive -Path "release/*" -DestinationPath "BMFontViewer-windows.zip" -Force

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: BMFontViewer-windows.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
